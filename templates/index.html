<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./css/output.css" rel="stylesheet">
</head>

<body>
  <main class="w-screen h-screen flex bg-Color-Palette-Dark-BG overflow-hidden gap-8">
    
    <!-- 左侧边栏 -->
    <sidebar class="w-[333px] px-8 py-12 bg-Color-Palette-Dark-Unit-BG justify-between h-full flex flex-col overflow-hidden">   
      <!-- 上部分内容 -->
      <upper class="flex flex-col justify-between items-center gap-8">
        <!-- Logo区域 -->
        <logobar class="inline-flex justify-between items-center gap-4">
          <logo>
            <img class="w-12 h-12 rounded-[999px]" src="https://placehold.co/50x50" />
          </logo>
          <div class="text-center justify-center text-Color-Palette-Dark-White text-4xl font-normal font-['Audiowide']">
            ConFrame
          </div>
        </logobar>

        <!-- 新建按钮 -->
        <button-new class="w-[269px] h-[72px] bg-gradient-to-br from-fuchsia-500 to-violet-600 rounded-[20px] inline-flex flex-col justify-center items-center">
          <div class="inline-flex justify-center items-center gap-2.5">
            <icon class="w-8 h-8 relative">
              <div data-svg-wrapper class="left-[4px] top-[16px] absolute">
                <svg width="27" height="2" viewBox="0 0 27 2" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M1.5 1H25.5" stroke="#E3E3E3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div data-svg-wrapper class="left-[16px] top-[4px] absolute">
                <svg width="3" height="26" viewBox="0 0 3 26" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M1.5 25V1" stroke="#E3E3E3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div class="w-8 h-8 left-0 top-0 absolute opacity-0"></div>
            </icon>
            <div class="justify-start text-Typography-Dark-Base-Primary-Gray-1 text-[22px] font-semibold font-['PingFang_SC'] tracking-tight">
              创建新项目
            </div>
          </div>
        </button-new>

        <!-- 导航菜单 -->
        <nav-items class="inline-flex flex-col justify-start items-start gap-2.5">
          <div class="self-stretch w-[269px] pl-8 pr-7 py-5 bg-Color-Palette-Dark-Unit-BG-2 rounded-[20px] inline-flex justify-start items-start overflow-hidden">
            <div class="flex justify-start items-center gap-3">
              <icon data-icon="Home" class="w-8 h-8 relative">
                <div class="overflow-hidden">
                  <icon data-svg-wrapper>
                    <svg width="26" height="27" viewBox="0 0 26 27" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path d="M9 26V16.1333C9 15.3866 9 15.0132 9.14532 14.728C9.27316 14.4771 9.47713 14.2732 9.72801 14.1453C10.0132 14 10.3866 14 11.1333 14H14.8667C15.6134 14 15.9868 14 16.272 14.1453C16.5229 14.2732 16.7268 14.4771 16.8547 14.728C17 15.0132 17 15.3866 17 16.1333V26M11.6903 1.68536L2.64719 8.71886C2.04269 9.18902 1.74045 9.4241 1.5227 9.71851C1.32982 9.97929 1.18614 10.2731 1.0987 10.5854C1 10.9381 1 11.321 1 12.0868V21.7333C1 23.2268 1 23.9736 1.29065 24.544C1.54631 25.0457 1.95426 25.4537 2.45603 25.7094C3.02646 26 3.77319 26 5.26667 26H20.7333C22.2268 26 22.9735 26 23.544 25.7094C24.0457 25.4537 24.4537 25.0457 24.7094 24.544C25 23.9736 25 23.2268 25 21.7333V12.0868C25 11.321 25 10.9381 24.9013 10.5854C24.8139 10.2731 24.6702 9.97929 24.4773 9.71851C24.2596 9.4241 23.9573 9.18902 23.3528 8.71887L14.3097 1.68536C13.8413 1.32103 13.6071 1.13886 13.3485 1.06883C13.1203 1.00704 12.8797 1.00704 12.6515 1.06883C12.3929 1.13886 12.1587 1.32103 11.6903 1.68536Z" stroke="#B8C0CC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </icon>
                </div>
              </icon>
              <div class="justify-start text-Typography-Dark-Base-Secondary-Gray-2 text-2xl font-medium font-['PingFang_SC'] tracking-tight">
                工作台
              </div>
            </div>
          </div>

          <div class="self-stretch w-[269px] pl-8 pr-7 py-5 bg-Color-Palette-Dark-Unit-BG rounded-[20px] inline-flex justify-start items-start overflow-hidden">
            <div class="flex justify-start items-center gap-3">
              <icon data-icon="Container" class="w-8 h-8 relative">
                <div class="overflow-hidden">
                  <icon data-svg-wrapper>
                    <svg width="26" height="30" viewBox="0 0 26 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path d="M24.3333 8.73882L13 15.0351M13 15.0351L1.66662 8.73882M13 15.0351L13 27.7018M25 20.4466V9.62375C25 9.16689 25 8.93847 24.9327 8.73473C24.8731 8.5545 24.7758 8.38906 24.6472 8.24947C24.5018 8.09169 24.3021 7.98075 23.9027 7.75888L14.036 2.2774C13.6579 2.06732 13.4688 1.96228 13.2686 1.9211C13.0914 1.88466 12.9086 1.88466 12.7314 1.9211C12.5312 1.96228 12.3421 2.06732 11.964 2.2774L2.09729 7.75888C1.69793 7.98075 1.49825 8.09169 1.35284 8.24947C1.22421 8.38906 1.12686 8.5545 1.06731 8.73474C1 8.93847 1 9.1669 1 9.62375V20.4466C1 20.9034 1 21.1318 1.06731 21.3356C1.12686 21.5158 1.22421 21.6813 1.35284 21.8208C1.49825 21.9786 1.69793 22.0896 2.0973 22.3114L11.964 27.7929C12.3421 28.003 12.5312 28.108 12.7314 28.1492C12.9086 28.1857 13.0914 28.1857 13.2686 28.1492C13.4688 28.108 13.6579 28.003 14.036 27.7929L23.9027 22.3114C24.3021 22.0896 24.5018 21.9786 24.6472 21.8208C24.7758 21.6813 24.8731 21.5158 24.9327 21.3356C25 21.1318 25 20.9034 25 20.4466Z" stroke="#B8C0CC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </icon>
                </div>
              </icon>
              <div class="justify-start text-Typography-Dark-Base-Secondary-Gray-2 text-2xl font-medium font-['PingFang_SC'] tracking-tight">
                我的作品
              </div>
            </div>
          </div>
        </nav-items>
      </upper>

      <!-- 底部设置区域 -->
      <set-items class="w-80 inline-flex flex-col justify-start items-start gap-2.5">
        <divider data-svg-wrapper>
          <svg width="271" height="2" viewBox="0 0 271 2" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1L270 1.00002" stroke="#576776" stroke-linecap="round"/>
          </svg>
        </divider>

        <div class="self-stretch h-20 pl-8 pr-7 py-5 bg-Color-Palette-Dark-Unit-BG rounded-[20px] inline-flex justify-start items-start overflow-hidden">
          <div class="flex justify-start items-center gap-3">
            <icon data-icon="Settings" class="w-8 h-8 relative">
              <!-- 设置图标SVG -->
            </icon>
            <div class="justify-start text-Typography-Dark-Base-Secondary-Gray-2 text-2xl font-medium font-['PingFang_SC']">
              设置
            </div>
          </div>
        </div>

        <div class="self-stretch h-20 pl-8 pr-7 py-5 bg-Color-Palette-Dark-Unit-BG rounded-[20px] inline-flex justify-start items-start overflow-hidden">
          <div class="flex justify-start items-center gap-3">
            <icon data-icon="Log-out" class="w-8 h-8 relative overflow-hidden">
              <!-- 登出图标SVG -->
            </icon>
            <div class="justify-start text-Typography-Dark-Base-Secondary-Gray-2 text-2xl font-medium font-['PingFang_SC']">
              登出账户
            </div>
          </div>
        </div>
      </set-items>
    </sidebar>

    <!-- 主要内容区域 -->
    <div class="flex-1 flex flex-col gap-8">
      <!-- 顶部栏 -->
      <topbar class="px-8 py-8 bg-Color-Palette-Dark-Unit-BG rounded-bl-2xl rounded-br-2xl flex inline-flex justify-between items-center">
        <div class="flex justify-start items-center gap-8">
          <div class="justify-start text-Typography-Dark-Base-Primary-Gray-1 text-32 font-semibold font-['PingFang_SC']">
            工作台
          </div>
          <div class="w-[400px] p-3 bg-Color-Palette-Dark-Unit-BG-2 rounded-xl inline-flex flex items-start gap-2.5">
            <icon data-icon="Search" class="w-7 h-7 relative">
              <!-- 搜索图标SVG -->
            </icon>
            <div class="justify-start text-Typography-Dark-Base-Secondary-Gray-2 text-lg font-normal font-['PingFang_SC']">
              搜索项目
            </div>
          </div>
        </div>

        <div class="w-52 flex justify-start items-center gap-5">
          <img class="w-12 h-12 rounded-[999px]" src="https://placehold.co/50x50" />
          <div class="inline-flex flex-col justify-start items-start gap-1">
            <div class="justify-start text-Typography-Dark-Base-Primary-Gray-1 text-lg font-medium font-['PingFang_SC']">
              酸菜且多余
            </div>
            <div class="justify-start text-Typography-Dark-Base-Secondary-Gray-2 text-xs font-medium font-['PingFang_SC']">
              wtl02@gmail.com
            </div>
          </div>
        </div>
      </topbar>

      <!-- 内容容器 -->
      <container class="flex-1 px-8 py-6 bg-Color-Palette-Dark-Unit-BG rounded-tl-2xl rounded-tr-2xl inline-flex flex-col justify-start items-start gap-6 overflow-hidden">
        <header class="justify-start text-Typography-Dark-Base-Primary-Gray-1 text-2xl font-medium font-['PingFang_SC'] tracking-tight">
          全部项目
        </header>

        <!-- 项目列表 -->
        <div class="self-stretch inline-flex justify-start items-start gap-8 flex-wrap content-start">
          <!-- 新建项目卡片 -->
          <addnew class="w-[465px] h-[356px] rounded-lg outline-dashed outline-[5px] outline-offset-[-5px] outline-Color-Palette-Dark-Dash inline-flex flex-col justify-center items-center gap-4">
            <icon class="w-14 h-14 relative">
              <!-- 加号图标SVG -->
            </icon>
            <div class="justify-start text-Typography-Dark-Base-Primary-Gray-1 text-xl font-semibold font-['PingFang_SC'] leading-normal">
              创建新项目
            </div>
          </addnew>

          <!-- 项目卡片 -->
          <div class="h-[356px] bg-Color-Palette-Dark-Unit-BG-2 rounded-lg inline-flex flex-col justify-start items-start gap-4 overflow-hidden">
            <div class="flex flex-col justify-start items-start overflow-hidden">
              <img class="w-[465px] h-[266px]" src="https://placehold.co/465x266" />
            </div>
            
            <div class="self-stretch px-6 inline-flex justify-between items-center">
              <div class="flex flex-col gap-1">
                <div class="justify-start text-Typography-Dark-Base-Primary-Gray-1 text-xl font-semibold font-['PingFang_SC']">
                  丛林寻踪
                </div>
                <div class="flex justify-start items-center">
                  <div class="justify-start text-Typography-Dark-Highlight-Primary text-base font-semibold font-['PingFang_SC']">
                    更新时间 · 
                  </div>
                  <div class="justify-start text-Typography-Dark-Highlight-Primary text-base font-semibold font-['PingFang_SC']">
                    2025-03-11 23:23
                  </div>
                </div>
              </div>

              <div class="w-10 h-10 rounded-[999px] flex justify-center items-center gap-2.5">
                <icon class="w-8 h-8 relative">
                  <!-- 三点菜单图标SVG -->
                </icon>
              </div>
            </div>
          </div>
        </div>
      </container>
    </div>
  </main>
</body>
</html>
